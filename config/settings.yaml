data:
  provider: local_csv
  csv_dir: local_data
  start_date: "2021-01-01"
  end_date: "2024-12-31"
  bar_interval: "4h"
  price_basis: "binance_perp"
  price_file: "prices_4h_perp.csv"
  spot_price_file: "spot_prices_4h.csv"
  index_price_file: "index_prices_4h.csv"
  funding_file: "funding_rates_8h.csv"
  open_interest_file: "open_interest_8h.csv"
ts_universe:
  symbols: [BTC, ETH, SOL, BNB, XRP, ADA, DOGE, AVAX, LINK, DOT, LTC, ATOM]
ts_research:
  horizons: [6, 18, 30, 60, 120]
  primary_horizon: 30
  signal_z_window: 1512
  signal_z_min_periods: 360
  entry_z: 0.75
  exit_z: 0.25
  one_way_cost_bps: 10
  output_dir: artifacts/ts4h_factor_research
  min_history_bars: 540
  annualization: 2190
  bars_per_day: 6
ts_backtest:
  benchmark_symbol: BTC
  output_dir: artifacts/ts4h_walkforward
  risk_weight_vol_window: 120
raw_generation:
  descriptor:
    output_dir: artifacts/raw_generation/descriptor
    symbols: [BTC]
    descriptors: [return, realized_volatility, dollar_volume, amihud, funding, basis, premium]
    transforms: [level, change, deviation, ratio, percentile, vol_adjusted]
    horizon_groups: [short, medium, long]
    primary_horizon: 30
  rule:
    output_dir: artifacts/raw_generation/rule
    symbols: [BTC]
    families: [moving_average_rule, trading_range_breakout, filter_rule]
    forms: [price_above_sma, price_above_ema, sma_crossover, ema_crossover, breakout_high_low, price_filter_from_lag]
    horizon_groups: [native_intraday, classic_daily]
    filter_threshold_bps: [50, 100, 200]
    primary_horizon: 30
score_admission:
  output_dir: artifacts/score_admission_4h
  horizons: [6, 18, 30, 60, 120]
  primary_horizon: 30
  z_window: 1512
  z_min_periods: 360
  clip_quantile: 0.01
  ewm_span: 1512
  rule_integrity_spread_gate: 0.7
  continuous_strong_spread_gate: 0.7
  continuous_conditional_spread_gate: 0.45
  continuous_conditional_monotonicity_gate: 0.5
  admission_rank_metric_floor: 0.015
  admission_generator_strength_floor: 0.40
  admission_family_strength_floor: 0.65
  admission_family_rank_cap: 3
  admission_rank_metric_positive: 0.0
composite_experiment:
  output_dir: artifacts/composite_experiment_4h
  horizons: [6, 18, 30, 60, 120]
  primary_horizon: 30
  max_scores_per_family: 2
  redundancy_corr_threshold: 0.85
  anchor_satellite_weights: [0.10, 0.15, 0.20, 0.25, 0.30, 0.40, 0.50]
  robust_relative_strength_floor: 0.90
  robust_stability_improvement_min: 0.05
  bootstrap_block_size: 24
  bootstrap_samples: 200
  bootstrap_seed: 7
  ic_weighted_subcomposite: true
scaled_alpha:
  output_dir: artifacts/scaled_alpha_4h
  primary_horizon: 30
  calibration_window: expanding
  bucket_count: 5
  min_train_points: 252
  scale_quantile: 0.95
  clip_min: -1.0
  clip_max: 1.0
position_mapping:
  output_dir: artifacts/position_mapping_4h
  position_scale: 1.0
  max_abs_position: 1.0
  rebalance_band: 0.10
  vol_window: 120
  target_annual_vol: 0.40
  min_annual_vol_floor: 0.10
  one_way_cost_bps: 10
  annualization: 2190
execution_realism:
  output_dir: artifacts/execution_realism_4h
  execution_lag_bars: 1
  delay_sensitivity_bars: [1, 2]
  base_one_way_cost_bps: 10
  vol_cost_multiplier_bps: 5
  turnover_cost_multiplier_bps: 10
  liquidity_cost_multiplier_bps: 5
  vol_window: 120
  liquidity_column: amihud_120bar
  annualization: 2190
  strong_relative_return_floor: 0.90
  robust_relative_return_floor: 0.80
